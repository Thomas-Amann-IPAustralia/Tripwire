name: Test Stage 3 (Phase 3 - With Tests)

on:
  workflow_dispatch:
    inputs:
      run_manual_test:
        description: 'Also run manual test on a real diff file?'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  test-stage3:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Verify API Key via Curl
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          curl https://api.openai.com/v1/models \
            -H "Authorization: Bearer $OPENAI_API_KEY"

      - name: Generate Mock Semantic Data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== Generating mock semantic embeddings ==="
          python generate_mock_data.py

      - name: Run Pytest Test Suite
        env:
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== Running Phase C Validation Suite ==="
          # Added -v for visibility and -ra to show skip/fail reasons
          pytest test_stage3.py -v -ra --tb=short

      - name: Upload handover packets
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: handover-packets-results
          path: handover_packets/ # Ensure this matches HANDOVER_DIR in your py script

      - name: Manual Test on Real Diff
        if: ${{ github.event.inputs.run_manual_test == 'true' }}
        env:
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== Testing with real diff file ==="
          # Update this to your actual script name
          SCRIPT_NAME="tripwire.py" 
          DIFF_FILE=$(find diff_archive -name "*.diff" | head -n 1)
          
          if [ -f "$DIFF_FILE" ]; then
            echo "Testing $SCRIPT_NAME with: $DIFF_FILE"
            python "$SCRIPT_NAME" --test-stage3 "$DIFF_FILE"
          else
            echo "No real diff files found in diff_archive to test."
          fi
