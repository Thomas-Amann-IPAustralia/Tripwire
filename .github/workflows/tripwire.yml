name: Tripwire Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 0-4" # 6am Sydney (AEST base), weekdays

permissions:
  contents: write

jobs:
  run-tripwire:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git diff logic

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Tripwire Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python tripwire.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Tripwire Bot"
          git config --global user.email "actions@github.com"

          git add audit_log.csv content_archive/ diff_archive/ handover_packets/ llm_verification_results/ llm_update_suggestions/ update_review_queue.csv 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No substantive changes."
          else
            git commit -m "Tripwire: Detected changes & recorded diffs [skip ci]"
            git push
          fi

      - name: Stage current-run artifacts
        if: always()
        run: |
          python - <<'EOF'
          import json, os, shutil

          manifest_path = "current_run_manifest.json"
          if not os.path.exists(manifest_path):
              print("No manifest found — nothing to stage.")
              exit(0)

          with open(manifest_path) as f:
              manifest = json.load(f)

          staging = {
              "staging/handover_packets":    manifest.get("handover_packets", []),
              "staging/verification_results": manifest.get("verification_results", []),
              "staging/update_suggestions":  manifest.get("update_suggestions", []),
          }

          for dest_dir, paths in staging.items():
              if paths:
                  os.makedirs(dest_dir, exist_ok=True)
                  for p in paths:
                      if os.path.exists(p):
                          shutil.copy2(p, dest_dir)
                          print(f"Staged: {p} → {dest_dir}")
                      else:
                          print(f"Warning: manifest references missing file: {p}")

          print("Staging complete.")
          EOF

      - name: Upload handover packets
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: handover-packets-${{ github.run_number }}
          path: staging/handover_packets/
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload LLM verification results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-verification-results-${{ github.run_number }}
          path: staging/verification_results/
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload LLM update suggestions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-update-suggestions-${{ github.run_number }}
          path: staging/update_suggestions/
          retention-days: 90
          if-no-files-found: ignore
