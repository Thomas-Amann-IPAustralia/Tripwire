name: Tripwire Pipeline

# Main monitoring pipeline — runs daily after the IPFR ingestion workflow
# has completed and updated the corpus database.
# See Section 7.1 of the system plan.

on:
  schedule:
    # Run at 02:00 UTC daily (after ingestion at 01:00 UTC).
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      run_id_override:
        description: "Override the auto-generated run ID (optional)"
        required: false
        default: ""
      log_level:
        description: "Logging level"
        required: false
        default: "INFO"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
      check_frequency_override:
        description: "Force check frequency override — use 'all' to check every source regardless of schedule, or a frequency string (daily, weekly, fortnightly, monthly, quarterly) to treat all sources as if they are on that schedule"
        required: false
        default: ""

# Only one pipeline run at a time — prevents concurrent writes to ipfr.sqlite.
concurrency:
  group: tripwire-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    name: Run Tripwire Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30       # Section 6.6 pipeline timeout
    permissions:
      contents: write          # required to commit snapshots back to the repo

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout — pull latest committed state to get the current corpus.
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pull latest committed state
        run: git pull --rebase origin ${{ github.ref_name }}

      # ------------------------------------------------------------------
      # 2. Python environment.
      # ------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Chrome for Selenium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-chrome-stable

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      # ------------------------------------------------------------------
      # 3. Cache Hugging Face model weights (lazy-load means we pay once).
      #    Both models are cached together since the bi-encoder is a subset
      #    of what the cross-encoder run requires.
      # ------------------------------------------------------------------
      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-bge-base-v1-5-gte-reranker
          restore-keys: |
            hf-models-bge-base-v1-5-
            hf-models-bge-base-

      # ------------------------------------------------------------------
      # 4. Download spaCy model (cached via pip cache above if re-run).
      # ------------------------------------------------------------------
      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      # ------------------------------------------------------------------
      # 5. Run the Tripwire pipeline (Stages 1–9).
      # ------------------------------------------------------------------
      - name: Run Tripwire pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FEEDBACK_EMAIL: ${{ secrets.FEEDBACK_EMAIL }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          RUN_ID_ARG=""
          if [ -n "${{ github.event.inputs.run_id_override }}" ]; then
            RUN_ID_ARG="--run-id ${{ github.event.inputs.run_id_override }}"
          fi
          LOG_LEVEL="${{ github.event.inputs.log_level || 'INFO' }}"
          FREQ_ARG=""
          if [ -n "${{ github.event.inputs.check_frequency_override }}" ]; then
            FREQ_ARG="--check-frequency ${{ github.event.inputs.check_frequency_override }}"
          fi
          python -m src.pipeline \
            --config tripwire_config.yaml \
            --log-level "$LOG_LEVEL" \
            $RUN_ID_ARG \
            $FREQ_ARG

      # ------------------------------------------------------------------
      # 6. Commit updated snapshots back to the repository (Section 7.2).
      #    The pipeline's _git_commit_snapshots() handles this, but we also
      #    add a workflow-level safety net here.
      # ------------------------------------------------------------------
      - name: Commit updated snapshots (safety net)
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/influencer_sources/snapshots/ data/ipfr_corpus/ipfr.sqlite || true
          git diff --cached --quiet || git commit -m "chore: update influencer snapshots [run ${{ github.run_id }}] [skip ci]"
          git push origin ${{ github.ref_name }} || true

      # ------------------------------------------------------------------
      # 7. Upload run logs as artifact (90-day retention).
      # ------------------------------------------------------------------
      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tripwire-run-${{ github.run_id }}
          path: |
            data/logs/
          retention-days: 90
          if-no-files-found: ignore
