name: Tripwire LLM Evaluation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LLM evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python evaluate_tripwire_llm.py

      - name: Upload evaluation outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-eval-results-${{ github.run_number }}
          path: |
            handover_packets/
            llm_verification_results/
            llm_update_suggestions/
            update_review_queue.csv
          retention-days: 30
          if-no-files-found: ignore
