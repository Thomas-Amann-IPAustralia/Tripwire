name: Tripwire LLM Evaluation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sanity check eval file and env (safe)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== Which eval file exists? ==="
          ls -la evaluate_tripwire_llm.py || true
          echo "=== Print first 40 lines of eval script ==="
          sed -n '1,40p' evaluate_tripwire_llm.py
          echo "=== Key present? (safe) ==="
          python -c "import os; k=os.getenv('OPENAI_API_KEY',''); print('OPENAI_API_KEY present:', bool(k)); print('length:', len(k))"

      - name: Run LLM evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python evaluate_tripwire_llm.py

      - name: Upload evaluation outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-eval-results-${{ github.run_number }}
          path: |
            llm_verification_results/
            handover_packets/
          retention-days: 30
          if-no-files-found: ignore
