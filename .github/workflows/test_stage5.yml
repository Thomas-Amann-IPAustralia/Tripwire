name: Tripwire Stage 5 Tests

on:
  workflow_dispatch:
  push:
    paths:
      - "tripwire/**"
      - "test_stage5.py"
  pull_request:
    paths:
      - "tripwire/**"
      - "test_stage5.py"

permissions:
  contents: read

jobs:
  run-stage5-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Stage 5 tests
        run: |
          pytest -v test_stage5.py

      - name: Upload pytest results (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stage5-test-failures
          path: |
            .pytest_cache
